local $scrPath = os.getenv("HOME") .. "/.local/share/bin"

hl.config({
  exec-once = {
    $scrPath .. "/resetxdgportal.sh",
    "dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP",
    "dbus-update-activation-environment --systemd --all",
    "systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP",
    "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1",
    "waybar",
    "blueman-applet",
    "nm-applet --indicator",
    "dunst",
    "hypridle",
    "wl-paste --type text --watch cliphist store",
    "wl-paste --type image --watch cliphist store",
    $scrPath .. "/swwwallpaper.sh",
    $scrPath .. "/batterynotify.sh",
    "hyprsunset -t 2500K",
    "pypr",
    "hyprpm reload",
    "smooth-scroll",
    "hyprpm reload Hyprspace",
    "hyprshader on",
    "youtube-local",
    "dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP",
    "/usr/lib/xdg-desktop-portal",
    "niri-screen-time -daemon",
  },

  env = {
    "PATH," .. os.getenv("PATH") .. ":" .. $scrPath,
    "GDK_BACKEND=wayland,x11",
    "XDG_CURRENT_DESKTOP=Hyprland",
    "SDL_VIDEODRIVER=wayland",
    "XDG_SESSION_TYPE=wayland",
    "XDG_SESSION_DESKTOP=Hyprland",
    "QT_QPA_PLATFORM=wayland;xcb",
    "QT_QPA_PLATFORMTHEME,qt6ct",
    "QT_WAYLAND_DISABLE_WINDOWDECORATION,1",
    "LANG,en_US.UTF-8",
    "LC_ALL,en_US.UTF-8",
    "QT_AUTO_SCREEN_SCALE_FACTOR,1",
    "MOZ_ENABLE_WAYLAND,1",
    "GDK_SCALE,1",
  },

  input = {
    kb_layout = "us",
    follow_mouse = 1,
    touchpad = {
      natural_scroll = "yes",
    },
    sensitivity = 1,
    force_no_accel = 1,
    numlock_by_default = false,
  },

  general = {
    gaps_in = 4,
    gaps_out = 4,
    border_size = 3,
    layout = "scrolling",
    col.active_border = rgba(155,122,194,1) rgba(189,154,230,1) rgba(40,12,62,1) rgba(209,170,240,1) rgba(155,122,194,1) rgba(189,154,230,1) rgba(40,12,62,1) rgba(209,170,240,1)
    col.inactive_border = rgba(81,87,109,1) rgba(98,104,128,1) rgba(115,121,148,1) rgba(131,139,167,1) 45deg
  },

  decoration = {
    rounding = 10,
    blur = {
      enabled = true,
      size = 12,
      passes = 4,
      ignore_opacity = false,
      new_optimizations = true,
      brightness = 1.0,
      contrast = 1.0,
      vibrancy = 0.8,
      vibrancy_darkness = 0.2,
    },
  },

  dwindle = {
    pseudotile = "yes",
    preserve_split = "yes",
  },

  scrolling = {
    fullscreen_on_one_column = true,
    column_width = 0.5,
    focus_fit_method = 1,
    follow_focus = true,
    follow_min_visible = 0.4,
    explicit_column_widths = "0.333, 0.5, 0.667, 1.0",
    wrap_focus = true,
    wrap_swapcol = true,
    direction = "right",
  },

  misc = {
    vrr = 0,
    disable_hyprland_logo = true,
    disable_splash_rendering = true,
    force_default_wallpaper = 0,
  },

  xwayland = {
    force_zero_scaling = true,
  },

  source = {
    "~/.config/hypr/animations.conf",
    "~/.config/hypr/keybindings.conf",
    "~/.config/hypr/windowrules.conf",
    "~/.config/hypr/monitors.conf",
    "~/.config/hypr/plugins/hyprgrass.conf",
    "~/.config/hypr/nvidia.conf",
  },

  $mod = "Super",

  bind = {
    "$mod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')",
    "$mod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')",
    "$mod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1",
    "$mod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1",
    "$mod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1",
    "$mod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1",
    "$mod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1",
  },

  binde = {
    "$mod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')",
    "$mod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')",
    "$mod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')",
    "$mod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')",
  },
})
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(155,122,194,1) rgba(189,154,230,1) rgba(40,12,62,1) rgba(209,170,240,1) rgba(155,122,194,1) rgba(189,154,230,1) rgba(40,12,62,1) rgba(209,170,240,1)
    col.inactive_border = rgba(81,87,109,1) rgba(98,104,128,1) rgba(115,121,148,1) rgba(131,139,167,1) 45deg
}
